name: Deploy — Meridian

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPO: meridian-backend
  APP_RUNNER_SERVICE: meridian-backend
  S3_BUCKET: ${{ secrets.S3_BUCKET }}

jobs:
  # ─────────────────────────────────────────
  # Job 1: Backend → ECR + App Runner
  # ─────────────────────────────────────────
  deploy-backend:
    name: Backend (Docker → ECR → App Runner)
    runs-on: ubuntu-latest
    outputs:
      app-runner-url: ${{ steps.get-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPO:${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            ./backend
          docker push $ECR_REGISTRY/$ECR_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPO:latest

      - name: Deploy to App Runner
        id: deploy
        uses: awslabs/amazon-app-runner-deploy@main
        with:
          service: ${{ env.APP_RUNNER_SERVICE }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          access-role-arn: ${{ secrets.APP_RUNNER_ROLE_ARN }}
          region: ${{ env.AWS_REGION }}
          port: 8000
          cpu: 0.25
          memory: 0.5
          wait-for-service-stability-seconds: 300
          copy-env-vars: |
            GOOGLE_API_KEY
            CORS_ORIGINS
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CORS_ORIGINS: ${{ secrets.CLOUDFRONT_URL }}

      - name: Get App Runner service URL
        id: get-url
        run: |
          URL=$(aws apprunner list-services --region ${{ env.AWS_REGION }} \
            --query "ServiceSummaryList[?ServiceName=='${{ env.APP_RUNNER_SERVICE }}'].ServiceUrl" \
            --output text)
          echo "url=https://$URL" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────
  # Job 2: Frontend → S3 + CloudFront
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Frontend (React → S3 → CloudFront)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.app-runner-url }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync build to S3
        working-directory: frontend
        run: |
          # Assets com hash — cache longo
          aws s3 sync dist/ s3://$S3_BUCKET \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html — sem cache
          aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
